<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher — Tuition Center Portal</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="shell">
    <div class="sidebar">
      <div class="brand"><span class="dot"></span>TCP Teacher</div>
      <div class="nav-item" onclick="document.getElementById('classes-section').scrollIntoView()">My Classes</div>
      <div class="nav-item" onclick="document.getElementById('attendance-section').scrollIntoView()">Attendance</div>
      <div class="nav-item" onclick="document.getElementById('homework-section').scrollIntoView()">Homework</div>
      <div class="nav-item" onclick="logout()" style="margin-top:auto;color:#E86A63;">Log out</div>
    </div>

    <div class="main">
      <div class="topbar">
        <h1>My Classes</h1>
        <div class="user-chip" id="user-chip">Loading…</div>
      </div>

      <div class="card" id="classes-section">
        <div class="section-title">Classes & video rooms</div>
        <table>
          <thead><tr><th>Subject</th><th>Room</th><th>Schedule</th><th></th></tr></thead>
          <tbody id="classes-body"><tr><td colspan="4" class="muted">Loading…</td></tr></tbody>
        </table>
      </div>

      <div class="card mt-16" id="attendance-section">
        <div class="section-title">Mark attendance</div>
        <div class="grid grid-2">
          <div>
            <label>Class</label>
            <select id="att-class"></select>
          </div>
          <div>
            <label>Date</label>
            <input type="date" id="att-date">
          </div>
        </div>
        <table>
          <thead><tr><th>Student</th><th>Status</th><th>WhatsApp message</th></tr></thead>
          <tbody id="attendance-body"><tr><td colspan="3" class="muted">Select a class</td></tr></tbody>
        </table>
      </div>

      <div class="card mt-16" id="homework-section">
        <div class="section-title">Post homework</div>
        <form id="hw-form">
          <div class="grid grid-2">
            <div>
              <label>Class</label>
              <select id="hw-class"></select>
            </div>
            <div>
              <label>Due date</label>
              <input type="date" id="hw-due">
            </div>
          </div>
          <label>Title</label>
          <input id="hw-title" required>
          <label>Details</label>
          <textarea id="hw-desc" rows="3"></textarea>
          <div class="error-msg" id="hw-error"></div>
          <button type="submit">Post homework & generate messages</button>
        </form>
        <div id="hw-messages" class="mt-16"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabaseClient.js"></script>
  <script src="/js/whatsapp.js"></script>
  <script src="/js/teacher.js"></script>
</body>
</html>
